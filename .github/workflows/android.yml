# .github/workflows/android.yml
name: Android CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - debug
          - release
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: '8.13'
        cache-disabled: false

    - name: Decode Keystore
      if: env.KEYSTORE_BASE64 != ''
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "🔐 解码签名文件..."
        # 将 Base64 编码的 keystore 解码为文件
        echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
        
        # 验证文件是否成功解码
        if [ -f "keystore.jks" ]; then
          echo "✅ 签名文件解码成功"
          ls -lh keystore.jks
        else
          echo "❌ 签名文件解码失败"
          exit 1
        fi

    - name: Determine build type
      id: build_type
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [[ "$BUILD_TYPE" == "debug" || "$BUILD_TYPE" == "both" ]]; then
            echo "debug=true" >> $GITHUB_OUTPUT
          else
            echo "debug=false" >> $GITHUB_OUTPUT
          fi
        
          if [[ "$BUILD_TYPE" == "release" || "$BUILD_TYPE" == "both" ]]; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi
        
          echo "is_manual=true" >> $GITHUB_OUTPUT
          echo "should_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT
        else
          echo "debug=true" >> $GITHUB_OUTPUT
          echo "release=true" >> $GITHUB_OUTPUT
          echo "is_manual=false" >> $GITHUB_OUTPUT
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Debug APK
      if: steps.build_type.outputs.debug == 'true'
      timeout-minutes: 30
      run: |
        echo "🔨 开始构建 Debug APK..."
        echo "Gradle 版本：$(gradle --version)"
        echo "Java 版本：$JAVA_HOME"
        
        gradle assembleDebug \
          -x lintDebug \
          --stacktrace \
          --no-daemon \
          --info
        
        BUILD_RESULT=$?
        
        if [ $BUILD_RESULT -eq 0 ]; then
          echo "✅ Debug APK 构建成功"
          # 验证文件是否存在
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "📦 APK 文件已生成：$(ls -lh app/build/outputs/apk/debug/app-debug.apk)"
          else
            echo "❌ APK 文件未找到！"
            find app/build/outputs -name "*.apk" 2>/dev/null || echo "未找到任何 APK 文件"
            exit 1
          fi
        else
          echo "❌ Debug APK 构建失败，退出码：$BUILD_RESULT"
          exit 1
        fi

    - name: Build Release APK
      if: steps.build_type.outputs.release == 'true'
      timeout-minutes: 30
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "🔨 开始构建 Release APK..."
        echo "Gradle 版本：$(gradle --version)"
        echo "Java 版本：$JAVA_HOME"
        
        # 检查签名文件是否存在
        if [ -f "keystore.jks" ]; then
          echo "✅ 签名文件已加载"
        else
          echo "⚠️  未找到签名文件，将生成未签名的 APK"
        fi
        
        gradle assembleRelease \
          -x lintRelease \
          --stacktrace \
          --no-daemon \
          --info
        
        BUILD_RESULT=$?
        
        if [ $BUILD_RESULT -eq 0 ]; then
          echo "✅ Release APK 构建成功"
          # 验证文件是否存在
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "📦 APK 文件已生成：$(ls -lh app/build/outputs/apk/release/app-release.apk)"
            # 检查是否已签名
            if unzip -l app/build/outputs/apk/release/app-release.apk | grep -q "META-INF"; then
              echo "✅ APK 已签名"
            else
              echo "⚠️  APK 可能未签名"
            fi
          else
            echo "❌ APK 文件未找到！"
            echo "查找所有生成的 APK 文件："
            find app/build/outputs -name "*.apk" 2>/dev/null || echo "未找到任何 APK 文件"
            echo "检查 build 目录结构："
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "APK 输出目录不存在"
            exit 1
          fi
        else
          echo "❌ Release APK 构建失败，退出码：$BUILD_RESULT"
          echo "检查 ProGuard 映射文件："
          ls -la app/build/outputs/mapping/ 2>/dev/null || echo "无映射文件"
          exit 1
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: steps.build_type.outputs.debug == 'true'
      with:
        name: app-debug-${{ github.sha }}-${{ github.run_id }}
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: steps.build_type.outputs.release == 'true'
      with:
        name: app-release-${{ github.sha }}-${{ github.run_id }}
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
        retention-days: 30

    - name: Create Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/v') || (steps.build_type.outputs.is_manual == 'true' && steps.build_type.outputs.should_release == 'true')
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          ${{ steps.build_type.outputs.debug == 'true' && 'app/build/outputs/apk/debug/app-debug.apk' || '' }}
          ${{ steps.build_type.outputs.release == 'true' && 'app/build/outputs/apk/release/app-release.apk' || '' }}
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        generate_release_notes: true
        fail_on_unmatched_files: true
