# .github/workflows/android.yml
name: Android CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - debug
          - release
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: '8.13'
        cache-disabled: false

    - name: Determine build type
      id: build_type
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [[ "$BUILD_TYPE" == "debug" || "$BUILD_TYPE" == "both" ]]; then
            echo "debug=true" >> $GITHUB_OUTPUT
          else
            echo "debug=false" >> $GITHUB_OUTPUT
          fi
        
          if [[ "$BUILD_TYPE" == "release" || "$BUILD_TYPE" == "both" ]]; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi
        
          echo "is_manual=true" >> $GITHUB_OUTPUT
          echo "should_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT
        else
          echo "debug=true" >> $GITHUB_OUTPUT
          echo "release=true" >> $GITHUB_OUTPUT
          echo "is_manual=false" >> $GITHUB_OUTPUT
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Debug APK
      if: steps.build_type.outputs.debug == 'true'
      timeout-minutes: 30
      run: |
        echo "开始构建 Debug APK..."
        gradle assembleDebug \
          -x lintDebug \
          --stacktrace \
          --no-daemon
        
        if [ $? -eq 0 ]; then
          echo "✓ Debug APK 构建成功"
        else
          echo "✗ Debug APK 构建失败"
          exit 1
        fi

    - name: Build Release APK
      if: steps.build_type.outputs.release == 'true'
      timeout-minutes: 30
      run: |
        echo "开始构建 Release APK..."
        gradle assembleRelease \
          -x lintRelease \
          --stacktrace \
          --no-daemon
        
        if [ $? -eq 0 ]; then
          echo "✓ Release APK 构建成功"
        else
          echo "✗ Release APK 构建失败"
          exit 1
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: steps.build_type.outputs.debug == 'true'
      with:
        name: app-debug-${{ github.sha }}-${{ github.run_id }}
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: steps.build_type.outputs.release == 'true'
      with:
        name: app-release-${{ github.sha }}-${{ github.run_id }}
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
        retention-days: 30

    - name: Create Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/v') || (steps.build_type.outputs.is_manual == 'true' && steps.build_type.outputs.should_release == 'true')
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          ${{ steps.build_type.outputs.debug == 'true' && 'app/build/outputs/apk/debug/app-debug.apk' || '' }}
          ${{ steps.build_type.outputs.release == 'true' && 'app/build/outputs/apk/release/app-release.apk' || '' }}
        draft: false
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        generate_release_notes: true
        fail_on_unmatched_files: true
